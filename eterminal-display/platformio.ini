; PlatformIO project for the Seeed reTerminal E1001 e-paper display.
;
; The E1001 is built around a XIAO ESP32-S3 with a 7.5" 800×480
; monochrome ePaper module. We target the official Seeed board
; definition so the board's flash size, partition table, USB CDC, and
; pin numbering all match what the hardware actually has.
;
; Seeed Arduino e-paper cookbook + the reTerminal E1001 example are the
; references for pin assignments. EPD_SELECT=0 picks the mono 7.5"
; panel in the GxEPD2 driver.

[platformio]
default_envs = e1001

[env:e1001]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Serial -> UART0 -> the reTerminal baseboard's USB-serial bridge
; (CH340/CP210x exposed as /dev/cu.usbserial-* on the host). Setting
; CDC-on-boot to 0 makes the default Serial object map to UART0
; instead of the XIAO's native USB CDC; operators plug into the
; baseboard, not the XIAO's tiny on-module USB-C port, so this is the
; one the logs need to flow through.
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MODE=1
  -D ETERMINAL_FIRMWARE_VERSION="\"0.1.0\""

; Library dependencies pinned to known-good majors. ArduinoJson v7 has a
; tighter API than v6; we use the new JsonDocument shape. ESP32 OTA +
; Update libs ship with the core; no library line needed for those.
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  https://github.com/ZinggJM/GxEPD2.git
  adafruit/Adafruit GFX Library @ ^1.11.9

; Larger filesystem so /config.json + /cache.json + a new firmware .bin
; fit comfortably alongside the spiffs partition.
board_build.partitions = default_8MB.csv
